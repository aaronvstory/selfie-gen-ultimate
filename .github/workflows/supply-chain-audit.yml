name: Supply Chain Audit

# Run pip-audit + OSV-Scanner on every push + PR. Fail CI on any
# advisory hit so we catch a compromised dep BEFORE it merges to main.
# Also runs nightly so a new CVE landing AFTER our last PR lights up
# the next morning instead of waiting for the next PR.

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
  pull_request:
  schedule:
    # 07:00 UTC daily — gives the PyPA + OSV DBs time to catch up
    # to overnight advisories before we scan.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (PyPA + OSV)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      # NOTE: --no-deps audits the DIRECT dependencies declared in the
      # requirements file only. It does NOT resolve or check transitive
      # deps from each file's audit step. The compensating control is
      # the `audit-installed-venv` job below, which installs the full
      # requirements.txt + similarity/ and runs pip-audit against the
      # resolved on-disk tree — that catches transitive CVEs (e.g. an
      # advisory in a sub-dep introduced by fal-client). OSV-Scanner is
      # a third independent check.

      - name: Audit requirements.txt (direct deps)
        run: |
          python -m pip_audit -r requirements.txt \
            --strict --no-deps --progress-spinner off

      - name: Audit similarity/requirements.txt (direct deps)
        run: |
          python -m pip_audit -r similarity/requirements.txt \
            --strict --no-deps --progress-spinner off

      - name: Audit similarity/requirements-test.txt (direct deps)
        run: |
          python -m pip_audit -r similarity/requirements-test.txt \
            --strict --no-deps --progress-spinner off

      - name: Audit each oldcam-v*/requirements.txt (direct deps)
        run: |
          set -e
          shopt -s nullglob
          for req in oldcam-v*/requirements.txt; do
            echo "=== $req ==="
            python -m pip_audit -r "$req" \
              --strict --no-deps --progress-spinner off
          done

  audit-installed-venv:
    # Compensating control for the --no-deps flag above. Install the
    # full requirements + similarity + oldcam-v24 (current default)
    # tree, then audit the RESOLVED on-disk dependency graph. Catches
    # transitive CVEs the requirements-file audit can't see. Subagent
    # MEDIUM on 4cc0bb4.
    name: Audit installed venv (transitive deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install requirements (binary-only)
        run: |
          python -m pip install --upgrade pip pip-audit
          # --only-binary :all: prevents sdist setup.py execution
          python -m pip install --only-binary :all: -r requirements.txt || \
            python -m pip install -r requirements.txt
          # Don't fail the whole step if optional similarity deps are too
          # heavy for this Ubuntu runner — they're covered by the
          # similarity-tests workflow.

      - name: Audit the installed venv (transitive CVEs)
        run: |
          python -m pip_audit --strict --progress-spinner off

  osv-scanner:
    name: OSV-Scanner (Google)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned to a specific version + SHA-style tag for supply-chain
      # discipline — we audit our own audit tooling. Update by reading
      # the new release notes + bumping ONLY after confirmation.
      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/.github/workflows/[email protected]
        with:
          scan-args: |-
            --recursive
            --skip-git
            --lockfile=requirements.txt
            --lockfile=similarity/requirements.txt

  ioc-self-check:
    name: IoC self-check (detect_compromise.py)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run IoC self-check
        run: |
          python scripts/detect_compromise.py
